<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Renju Transformer ONNX デモ</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f0e8;
        --panel: #fffaf2;
        --ink: #1f1c18;
        --muted: #6d6459;
        --line: #d4c5b4;
        --accent: #1d6b52;
        --accent-2: #c0612f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Hiragino Sans", sans-serif;
        background:
          radial-gradient(circle at top left, #f8e8cc 0, transparent 32%),
          linear-gradient(180deg, #f3ecdf 0%, var(--bg) 100%);
        color: var(--ink);
      }

      main {
        width: min(920px, calc(100vw - 32px));
        margin: 32px auto;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: color-mix(in srgb, var(--panel) 92%, white);
        box-shadow: 0 16px 40px rgba(66, 45, 18, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }

      .page-header {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        justify-content: space-between;
      }

      .page-header-copy {
        display: grid;
        gap: 8px;
      }

      .page-header-copy p {
        margin: 0;
      }

      p,
      label,
      input,
      textarea,
      button,
      pre {
        font: inherit;
      }

      .muted {
        color: var(--muted);
      }

      .grid {
        display: grid;
        gap: 16px;
      }

      .grid.two {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }

      .field {
        display: grid;
        gap: 8px;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        color: var(--ink);
      }

      textarea {
        min-height: 160px;
        resize: vertical;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .play-area {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
        gap: 20px;
        align-items: start;
      }

      .board-shell {
        position: relative;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: linear-gradient(180deg, #f0d39f 0%, #ddb977 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }

      .board {
        display: grid;
        grid-template-columns: repeat(15, minmax(18px, 1fr));
        gap: 2px;
        aspect-ratio: 1;
      }

      .cell {
        position: relative;
        border: 0;
        border-radius: 4px;
        background: rgba(138, 86, 24, 0.18);
        min-width: 0;
        min-height: 0;
        padding: 0;
      }

      .cell::before,
      .cell::after {
        content: "";
        position: absolute;
        background: rgba(84, 52, 19, 0.45);
      }

      .cell::before {
        left: 50%;
        top: 0;
        width: 1px;
        height: 100%;
        transform: translateX(-50%);
      }

      .cell::after {
        left: 0;
        top: 50%;
        width: 100%;
        height: 1px;
        transform: translateY(-50%);
      }

      .stone {
        position: absolute;
        inset: 14%;
        border-radius: 50%;
        box-shadow: inset 0 2px 6px rgba(255, 255, 255, 0.2), 0 2px 4px rgba(0, 0, 0, 0.2);
        z-index: 1;
      }

      .stone.black {
        background: radial-gradient(circle at 30% 30%, #535353 0%, #171717 60%, #000 100%);
      }

      .stone.white {
        background: radial-gradient(circle at 30% 30%, #ffffff 0%, #f2eadb 56%, #d8ccb8 100%);
      }

      .cell.legal {
        outline: 1px solid rgba(29, 107, 82, 0.35);
      }

      .cell.last-move {
        box-shadow: inset 0 0 0 2px rgba(192, 97, 47, 0.85);
      }

      .cell.opening-target {
        outline: 2px solid rgba(192, 97, 47, 0.9);
        outline-offset: -2px;
      }

      .cell.opening-target::before,
      .cell.opening-target::after {
        background: rgba(192, 97, 47, 0.7);
      }

      .opening-tip {
        position: absolute;
        left: 50%;
        top: calc(50% - 34px);
        transform: translate(-50%, -100%);
        z-index: 3;
        max-width: min(280px, calc(100% - 32px));
        padding: 10px 14px;
        border: 1px solid rgba(192, 97, 47, 0.35);
        border-radius: 14px;
        background: rgba(255, 250, 242, 0.96);
        color: var(--ink);
        text-align: center;
        font-size: 0.95rem;
        line-height: 1.45;
        box-shadow: 0 10px 24px rgba(66, 45, 18, 0.16);
        pointer-events: none;
      }

      .opening-tip::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -10px;
        width: 16px;
        height: 16px;
        background: inherit;
        border-right: 1px solid rgba(192, 97, 47, 0.35);
        border-bottom: 1px solid rgba(192, 97, 47, 0.35);
        transform: translateX(-50%) rotate(45deg);
      }

      .opening-tip[hidden] {
        display: none;
      }

      .panel {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 250, 242, 0.92);
      }

      .stats {
        display: grid;
        gap: 10px;
      }

      .stat {
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #fff;
      }

      .moves {
        max-height: 220px;
        overflow: auto;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: #fff;
        white-space: pre-wrap;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        cursor: pointer;
        color: white;
        background: var(--accent);
      }

      button.secondary {
        background: var(--accent-2);
      }

      button.language-toggle {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        justify-content: center;
        min-width: 82px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        white-space: nowrap;
      }

      .language-current {
        color: var(--accent);
        font-weight: 700;
      }

      .language-next {
        color: var(--muted);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        padding: 12px 14px;
        border-radius: 12px;
        background: #f7efe4;
        border: 1px solid var(--line);
      }

      pre {
        margin: 0;
        padding: 16px;
        border-radius: 16px;
        border: 1px solid #25362d;
        background: #13201a;
        color: #eef7f0;
        overflow: auto;
      }

      code {
        font-family: Consolas, monospace;
      }

      @media (max-width: 820px) {
        .play-area {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .page-header {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="grid">
      <header class="page-header">
        <div class="page-header-copy">
          <h1 data-i18n="title">Renju Transformer ONNX デモ</h1>
          <p class="muted" data-i18n-html="introHtml">
            同じディレクトリにある <code>renju_transformer.onnx</code> と metadata JSON を読み込み、
            ブラウザ上で次の一手を推論します。
          </p>
        </div>
        <button
          id="language-toggle"
          type="button"
          class="language-toggle"
          aria-label="Englishへ切り替え"
        >
          <span id="language-current" class="language-current">JA</span>
          <span aria-hidden="true">/</span>
          <span id="language-next" class="language-next">EN</span>
        </button>
      </header>

      <section class="play-area">
        <div class="board-shell">
          <div class="opening-tip" id="opening-tip" data-i18n="openingTip" hidden>
            初手なので中央においてね
          </div>
          <div class="board" id="board"></div>
        </div>
        <div class="panel grid">
          <div class="stats">
            <div class="stat" id="turn-status">手番: 黒(AI)</div>
            <div class="stat" id="game-status">状態: 開始前</div>
            <div class="stat" id="ai-status">AI: まだ着手していません</div>
          </div>
          <div class="actions">
            <button id="new-game" type="button" data-i18n="newGameButton">新しい対局</button>
            <button id="ai-move" type="button" class="secondary" data-i18n="aiMoveButton">
              AI に着手させる
            </button>
          </div>
          <div>
            <label for="move-log" data-i18n="moveLogLabel">棋譜ログ</label>
            <div class="moves" id="move-log">まだ手がありません。</div>
          </div>
        </div>
      </section>

      <section class="grid two">
        <div class="field">
          <label for="model-url" data-i18n="modelUrlLabel">モデル URL</label>
          <input id="model-url" value="./renju_transformer.onnx" />
        </div>
        <div class="field">
          <label for="metadata-url" data-i18n="metadataUrlLabel">metadata URL</label>
          <input id="metadata-url" value="./renju_transformer.onnx.metadata.json" />
        </div>
      </section>

      <section class="grid">
        <div class="field">
          <label for="board-csv" data-i18n="boardCsvLabel">盤面 CSV</label>
          <textarea
            id="board-csv"
            spellcheck="false"
            data-i18n-placeholder="boardCsvPlaceholder"
            placeholder="225 個の 0/1/2 をカンマ区切りで入力してください。0=空, 1=黒, 2=白"
          ></textarea>
        </div>
        <div class="actions">
          <button id="fill-empty" type="button" class="secondary" data-i18n="fillEmptyButton">
            空盤面を入れる
          </button>
          <button id="load-model" type="button" data-i18n="loadModelButton">モデルを読み込む</button>
          <button id="run-predict" type="button" data-i18n="runPredictButton">推論する</button>
        </div>
      </section>

      <section class="grid two">
        <div class="status" id="status">モデル未ロード</div>
        <div class="status" id="board-info">盤面セル数: 未入力</div>
      </section>

      <section class="grid">
        <label for="result" data-i18n="resultLabel">推論結果</label>
        <pre id="result">まだ推論していません。</pre>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.23.2/dist/ort.min.js"></script>
    <script type="module">
      import {
        BLACK,
        WHITE,
        boardIsFull,
        boardWinner,
        legalMoveMask,
        loadModel,
        parseBoardCsv,
        predictBoard,
        setOrtRuntime,
      } from "./renju_onnx.js";

      const ORT_VERSION = "1.23.2";
      setOrtRuntime(globalThis.ort);
      ort.env.wasm.wasmPaths = `https://cdn.jsdelivr.net/npm/onnxruntime-web@${ORT_VERSION}/dist/`;

      const modelUrlInput = document.querySelector("#model-url");
      const metadataUrlInput = document.querySelector("#metadata-url");
      const boardCsvInput = document.querySelector("#board-csv");
      const boardNode = document.querySelector("#board");
      const openingTipNode = document.querySelector("#opening-tip");
      const loadButton = document.querySelector("#load-model");
      const predictButton = document.querySelector("#run-predict");
      const fillEmptyButton = document.querySelector("#fill-empty");
      const newGameButton = document.querySelector("#new-game");
      const aiMoveButton = document.querySelector("#ai-move");
      const statusNode = document.querySelector("#status");
      const boardInfoNode = document.querySelector("#board-info");
      const turnStatusNode = document.querySelector("#turn-status");
      const gameStatusNode = document.querySelector("#game-status");
      const aiStatusNode = document.querySelector("#ai-status");
      const moveLogNode = document.querySelector("#move-log");
      const resultNode = document.querySelector("#result");
      const languageToggleButton = document.querySelector("#language-toggle");
      const languageCurrentNode = document.querySelector("#language-current");
      const languageNextNode = document.querySelector("#language-next");

      const LANGUAGE_STORAGE_KEY = "renju-transformer.docs.language";
      const LANGUAGES = ["ja", "en"];
      const AI_PLAYER = BLACK;
      const HUMAN_PLAYER = WHITE;
      const I18N = {
        ja: {
          ai: "AI",
          aiAfterHumanMove: "AI: あなたの着手後に応答します",
          aiFailed: ({message}) => `AI: 失敗 (${message})`,
          aiIdle: "AI: まだ着手していません",
          aiMoveButton: "AI に着手させる",
          aiMoveFailed: "AI 着手失敗",
          aiMoved: ({coord, moveId, probability}) =>
            `AI: ${coord} に着手 (top1=${moveId}, prob=${probability})`,
          aiSyncedFromTextarea: "AI: textarea から盤面を反映",
          aiThinking: "AI が考えています...",
          aiTurn: "AI の手番",
          black: "黒",
          blackWins: "黒の勝ち",
          boardApplied: "盤面を反映",
          boardCsvLabel: "盤面 CSV",
          boardCsvPlaceholder: "225 個の 0/1/2 をカンマ区切りで入力してください。0=空, 1=黒, 2=白",
          boardInfoCount: ({count}) => `盤面セル数: ${count}`,
          boardInfoEmpty: "盤面セル数: 未入力",
          boardInfoParseFailed: ({message}) => `盤面セル数: 解析失敗 (${message})`,
          cellLabel: ({coord}) => `交点 ${coord}`,
          draw: "引き分け",
          fillEmptyButton: "空盤面を入れる",
          gameStatus: ({message}) => `状態: ${message}`,
          illegalMove: ({coord}) => `そこには打てません: ${coord}`,
          inferenceComplete: ({moveId}) => `推論完了: predicted_move_id=${moveId}`,
          inferenceFailed: ({message}) => `推論失敗: ${message}`,
          introHtml:
            '同じディレクトリにある <code>renju_transformer.onnx</code> と metadata JSON を読み込み、ブラウザ上で次の一手を推論します。',
          languageName: "日本語",
          languageShortName: "JA",
          languageToggleLabel: ({language}) => `${language}へ切り替え`,
          loadFailed: ({message}) => `読み込み失敗: ${message}`,
          loadModelButton: "モデルを読み込む",
          metadataUrlLabel: "metadata URL",
          modelLoaded: ({boardSize, inputLength}) =>
            `モデル読み込み完了: ${boardSize}x${boardSize}, input_length=${inputLength}`,
          modelLoading: "モデルを読み込み中...",
          modelUnloaded: "モデル未ロード",
          modelUrlLabel: "モデル URL",
          moveLogEmpty: "まだ手がありません。",
          moveLogEntry: ({moveNumber, playerLabel, coord, probability}) =>
            probability == null
              ? `${moveNumber}. ${playerLabel} ${coord}`
              : `${moveNumber}. ${playerLabel} ${coord} prob=${probability}`,
          moveLogLabel: "棋譜ログ",
          newGame: "新しい対局",
          newGameButton: "新しい対局",
          notAiTurn: "今は AI の手番ではありません。",
          notHumanTurn: "今はあなたの手番ではありません。",
          openingTip: "初手なので中央においてね",
          resultIdle: "まだ推論していません。",
          resultLabel: "推論結果",
          runPredictButton: "推論する",
          statusAiMoveFailed: ({message}) => `AI 着手失敗: ${message}`,
          title: "Renju Transformer ONNX デモ",
          turnCurrent: ({playerLabel, actorLabel}) => `手番: ${playerLabel}(${actorLabel})`,
          turnGameOver: "手番: 対局終了",
          white: "白",
          whiteWins: "白の勝ち",
          you: "あなた",
          yourTurn: "あなたの手番",
        },
        en: {
          ai: "AI",
          aiAfterHumanMove: "AI: will respond after your move",
          aiFailed: ({message}) => `AI: failed (${message})`,
          aiIdle: "AI: no move yet",
          aiMoveButton: "Let AI move",
          aiMoveFailed: "AI move failed",
          aiMoved: ({coord, moveId, probability}) =>
            `AI: moved at ${coord} (top1=${moveId}, prob=${probability})`,
          aiSyncedFromTextarea: "AI: synced board from textarea",
          aiThinking: "AI is thinking...",
          aiTurn: "AI's turn",
          black: "Black",
          blackWins: "Black wins",
          boardApplied: "Board applied",
          boardCsvLabel: "Board CSV",
          boardCsvPlaceholder: "Enter 225 comma-separated 0/1/2 values. 0=empty, 1=black, 2=white",
          boardInfoCount: ({count}) => `Board cells: ${count}`,
          boardInfoEmpty: "Board cells: not entered",
          boardInfoParseFailed: ({message}) => `Board cells: parse failed (${message})`,
          cellLabel: ({coord}) => `Intersection ${coord}`,
          draw: "Draw",
          fillEmptyButton: "Fill empty board",
          gameStatus: ({message}) => `Status: ${message}`,
          illegalMove: ({coord}) => `Illegal move: ${coord}`,
          inferenceComplete: ({moveId}) => `Inference complete: predicted_move_id=${moveId}`,
          inferenceFailed: ({message}) => `Inference failed: ${message}`,
          introHtml:
            'Loads <code>renju_transformer.onnx</code> and the metadata JSON from this directory, then predicts the next move in your browser.',
          languageName: "English",
          languageShortName: "EN",
          languageToggleLabel: ({language}) => `Switch to ${language}`,
          loadFailed: ({message}) => `Load failed: ${message}`,
          loadModelButton: "Load model",
          metadataUrlLabel: "Metadata URL",
          modelLoaded: ({boardSize, inputLength}) =>
            `Model loaded: ${boardSize}x${boardSize}, input_length=${inputLength}`,
          modelLoading: "Loading model...",
          modelUnloaded: "Model not loaded",
          modelUrlLabel: "Model URL",
          moveLogEmpty: "No moves yet.",
          moveLogEntry: ({moveNumber, playerLabel, coord, probability}) =>
            probability == null
              ? `${moveNumber}. ${playerLabel} ${coord}`
              : `${moveNumber}. ${playerLabel} ${coord} prob=${probability}`,
          moveLogLabel: "Move log",
          newGame: "New game",
          newGameButton: "New game",
          notAiTurn: "It is not the AI's turn.",
          notHumanTurn: "It is not your turn.",
          openingTip: "First move must be at the center",
          resultIdle: "No inference yet.",
          resultLabel: "Inference result",
          runPredictButton: "Run inference",
          statusAiMoveFailed: ({message}) => `AI move failed: ${message}`,
          title: "Renju Transformer ONNX Demo",
          turnCurrent: ({playerLabel, actorLabel}) => `Turn: ${playerLabel} (${actorLabel})`,
          turnGameOver: "Turn: game over",
          white: "White",
          whiteWins: "White wins",
          you: "you",
          yourTurn: "Your turn",
        },
      };

      function readLanguagePreference() {
        try {
          const storedLanguage = localStorage.getItem(LANGUAGE_STORAGE_KEY);
          if (LANGUAGES.includes(storedLanguage)) {
            return storedLanguage;
          }
        } catch {
          // Keep the default when storage is unavailable.
        }
        return "ja";
      }

      let currentLanguage = readLanguagePreference();
      const displayState = {
        aiStatus: {key: "aiIdle", args: {}},
        result: {kind: "translated", key: "resultIdle", args: {}},
        status: {key: "modelUnloaded", args: {}},
      };

      let loaded = null;
      const gameState = {
        board: new Array(225).fill(0),
        busy: false,
        gameMessage: {key: "newGame", args: {}},
        over: false,
        lastMoveIndex: null,
        moveLog: [],
      };

      function t(key, args = {}) {
        const value = I18N[currentLanguage][key] ?? I18N.ja[key] ?? key;
        return typeof value === "function" ? value(args) : value;
      }

      function writeLanguagePreference(language) {
        try {
          localStorage.setItem(LANGUAGE_STORAGE_KEY, language);
        } catch {
          // Language switching should still work when persistence is blocked.
        }
      }

      function indexToCoord(index, boardSize = 15) {
        const row = Math.floor(index / boardSize) + 1;
        const col = (index % boardSize) + 1;
        return `(${row}, ${col})`;
      }

      function playerName(player) {
        return player === BLACK ? t("black") : t("white");
      }

      function actorName(player) {
        return player === AI_PLAYER ? t("ai") : t("you");
      }

      function renderLanguageToggle() {
        const nextLanguage = currentLanguage === "ja" ? "en" : "ja";
        languageCurrentNode.textContent = I18N[currentLanguage].languageShortName;
        languageNextNode.textContent = I18N[nextLanguage].languageShortName;
        languageToggleButton.setAttribute(
          "aria-label",
          t("languageToggleLabel", {language: I18N[nextLanguage].languageName}),
        );
        languageToggleButton.title = t("languageToggleLabel", {
          language: I18N[nextLanguage].languageName,
        });
      }

      function renderStatus() {
        statusNode.textContent = t(displayState.status.key, displayState.status.args);
      }

      function setStatus(key, args = {}) {
        displayState.status = {key, args};
        renderStatus();
      }

      function renderAiStatus() {
        aiStatusNode.textContent = t(displayState.aiStatus.key, displayState.aiStatus.args);
      }

      function setAiStatus(key, args = {}) {
        displayState.aiStatus = {key, args};
        renderAiStatus();
      }

      function renderResult() {
        resultNode.textContent =
          displayState.result.kind === "translated"
            ? t(displayState.result.key, displayState.result.args)
            : displayState.result.value;
      }

      function setResult(value) {
        displayState.result = {kind: "raw", value};
        renderResult();
      }

      function setTranslatedResult(key, args = {}) {
        displayState.result = {kind: "translated", key, args};
        renderResult();
      }

      function applyLanguage(language) {
        currentLanguage = language;
        document.documentElement.lang = language;
        document.title = t("title");
        document.querySelectorAll("[data-i18n]").forEach((node) => {
          node.textContent = t(node.dataset.i18n);
        });
        document.querySelectorAll("[data-i18n-html]").forEach((node) => {
          node.innerHTML = t(node.dataset.i18nHtml);
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((node) => {
          node.placeholder = t(node.dataset.i18nPlaceholder);
        });
        renderLanguageToggle();
        renderStatus();
        renderAiStatus();
        renderResult();
        refreshGameSummary();
      }

      function updateBoardInfo() {
        const raw = boardCsvInput.value.trim();
        if (!raw) {
          boardInfoNode.textContent = t("boardInfoEmpty");
          return;
        }
        try {
          const board = parseBoardCsv(raw);
          boardInfoNode.textContent = t("boardInfoCount", {count: board.length});
        } catch (error) {
          boardInfoNode.textContent = t("boardInfoParseFailed", {message: error.message});
        }
      }

      function syncGameFromTextarea() {
        try {
          const board = parseBoardCsv(boardCsvInput.value.trim());
          if (board.length !== 225 || gameState.busy) {
            return;
          }
          legalMoveMask(board, loaded?.metadata);
          gameState.board = board;
          gameState.over = false;
          gameState.lastMoveIndex = null;
          gameState.moveLog = [];
          setAiStatus("aiSyncedFromTextarea");
          refreshGameSummary("boardApplied");
          evaluateBoardAfterMove();
        } catch {
          // ignore partial or invalid edits
        }
      }

      function syncBoardCsv() {
        boardCsvInput.value = gameState.board.join(",");
        updateBoardInfo();
      }

      function legalMaskForCurrentBoard() {
        const metadata = loaded?.metadata;
        try {
          return legalMoveMask(gameState.board, metadata);
        } catch {
          return null;
        }
      }

      function isOpeningMove() {
        return gameState.board.every((cell) => cell === 0) && !gameState.busy && !gameState.over;
      }

      function renderMoveLog() {
        if (gameState.moveLog.length === 0) {
          moveLogNode.textContent = t("moveLogEmpty");
          return;
        }
        moveLogNode.textContent = gameState.moveLog
          .map((entry, index) => {
            if (typeof entry === "string") {
              return entry;
            }
            return t("moveLogEntry", {
              coord: indexToCoord(entry.index),
              moveNumber: index + 1,
              playerLabel: playerName(entry.player),
              probability: entry.probability,
            });
          })
          .join("\n");
      }

      function renderBoard() {
        const legalMask = !gameState.over && !gameState.busy ? legalMaskForCurrentBoard() : null;
        const showOpeningTip = isOpeningMove();
        const centerIndex = Math.floor(gameState.board.length / 2);
        openingTipNode.hidden = !showOpeningTip;
        boardNode.replaceChildren();
        for (let index = 0; index < gameState.board.length; index += 1) {
          const cellValue = gameState.board[index];
          const button = document.createElement("button");
          button.type = "button";
          button.className = "cell";
          button.dataset.index = String(index);
          button.title = indexToCoord(index);
          button.setAttribute("aria-label", t("cellLabel", {coord: indexToCoord(index)}));
          if (legalMask?.[index]) {
            button.classList.add("legal");
          }
          if (showOpeningTip && index === centerIndex) {
            button.classList.add("opening-target");
          }
          if (gameState.lastMoveIndex === index) {
            button.classList.add("last-move");
          }
          if (cellValue !== 0) {
            const stone = document.createElement("span");
            stone.className = `stone ${cellValue === BLACK ? "black" : "white"}`;
            stone.ariaHidden = "true";
            button.append(stone);
          }
          button.addEventListener("click", () => handleHumanMove(index));
          boardNode.append(button);
        }
      }

      function currentPlayer() {
        try {
          return gameState.board.filter((value) => value === BLACK).length ===
            gameState.board.filter((value) => value === WHITE).length
            ? BLACK
            : WHITE;
        } catch {
          return BLACK;
        }
      }

      function refreshGameSummary(messageKey = null, args = {}) {
        if (messageKey) {
          gameState.gameMessage = {key: messageKey, args};
        }
        const player = currentPlayer();
        turnStatusNode.textContent = gameState.over
          ? t("turnGameOver")
          : t("turnCurrent", {actorLabel: actorName(player), playerLabel: playerName(player)});
        gameStatusNode.textContent = t("gameStatus", {
          message: t(gameState.gameMessage.key, gameState.gameMessage.args),
        });
        renderMoveLog();
        syncBoardCsv();
        renderBoard();
      }

      function finishGame(messageKey) {
        gameState.over = true;
        gameState.busy = false;
        refreshGameSummary(messageKey);
      }

      function evaluateBoardAfterMove() {
        const winner = boardWinner(gameState.board, loaded?.metadata);
        if (winner === BLACK) {
          finishGame("blackWins");
          return true;
        }
        if (winner === WHITE) {
          finishGame("whiteWins");
          return true;
        }
        if (boardIsFull(gameState.board, loaded?.metadata)) {
          finishGame("draw");
          return true;
        }
        return false;
      }

      function resetGame() {
        gameState.board = new Array(225).fill(0);
        gameState.busy = false;
        gameState.over = false;
        gameState.lastMoveIndex = null;
        gameState.moveLog = [];
        setAiStatus("aiIdle");
        refreshGameSummary("newGame");
        setTranslatedResult("resultIdle");
        queueAiOpeningMove();
      }

      async function ensureLoaded() {
        if (loaded) {
          return loaded;
        }
        setStatus("modelLoading");
        loaded = await loadModel(modelUrlInput.value.trim(), metadataUrlInput.value.trim(), {
          executionProviders: ["wasm"],
        });
        setStatus("modelLoaded", {
          boardSize: loaded.metadata.board_size,
          inputLength: loaded.metadata.input_length,
        });
        return loaded;
      }

      function createEmptyBoardCsv() {
        return new Array(225).fill(0).join(",");
      }

      async function runAiMove() {
        if (gameState.busy || gameState.over) {
          return;
        }
        if (currentPlayer() !== AI_PLAYER) {
          setStatus("notAiTurn");
          return;
        }

        gameState.busy = true;
        refreshGameSummary("aiThinking");
        try {
          const {session, metadata} = await ensureLoaded();
          const prediction = await predictBoard(session, gameState.board, metadata, {
            topK: 5,
            applyLegalMask: true,
          });
          const aiIndex = prediction.predictedIndex;
          gameState.board[aiIndex] = AI_PLAYER;
          gameState.lastMoveIndex = aiIndex;
          const probability = prediction.predictedProbability.toFixed(4);
          gameState.moveLog.push({index: aiIndex, player: AI_PLAYER, probability});
          setAiStatus("aiMoved", {
            coord: indexToCoord(aiIndex),
            moveId: prediction.predictedMoveId,
            probability,
          });
          setResult(JSON.stringify(prediction, null, 2));
          if (!evaluateBoardAfterMove()) {
            gameState.busy = false;
            refreshGameSummary("yourTurn");
          }
        } catch (error) {
          gameState.busy = false;
          refreshGameSummary("aiMoveFailed");
          setAiStatus("aiFailed", {message: error.message});
          setResult(error.stack ?? String(error));
          setStatus("statusAiMoveFailed", {message: error.message});
        }
      }

      async function handleHumanMove(index) {
        if (gameState.busy || gameState.over) {
          return;
        }
        if (currentPlayer() !== HUMAN_PLAYER) {
          setStatus("notHumanTurn");
          return;
        }
        const legalMask = legalMaskForCurrentBoard();
        if (!legalMask?.[index]) {
          setStatus("illegalMove", {coord: indexToCoord(index)});
          return;
        }
        gameState.board[index] = HUMAN_PLAYER;
        gameState.lastMoveIndex = index;
        gameState.moveLog.push({index, player: HUMAN_PLAYER});
        setAiStatus("aiAfterHumanMove");
        refreshGameSummary("aiTurn");
        if (evaluateBoardAfterMove()) {
          return;
        }
        await runAiMove();
      }

      loadButton.addEventListener("click", async () => {
        loadButton.disabled = true;
        predictButton.disabled = true;
        try {
          loaded = null;
          await ensureLoaded();
          queueAiOpeningMove();
        } catch (error) {
          setStatus("loadFailed", {message: error.message});
        } finally {
          loadButton.disabled = false;
          predictButton.disabled = false;
        }
      });

      predictButton.addEventListener("click", async () => {
        loadButton.disabled = true;
        predictButton.disabled = true;
        try {
          const {session, metadata} = await ensureLoaded();
          const board = parseBoardCsv(boardCsvInput.value.trim());
          const prediction = await predictBoard(session, board, metadata, {
            topK: 5,
            applyLegalMask: true,
          });
          setResult(JSON.stringify(prediction, null, 2));
          setStatus("inferenceComplete", {moveId: prediction.predictedMoveId});
        } catch (error) {
          setResult(error.stack ?? String(error));
          setStatus("inferenceFailed", {message: error.message});
        } finally {
          loadButton.disabled = false;
          predictButton.disabled = false;
        }
      });

      fillEmptyButton.addEventListener("click", () => {
        resetGame();
      });

      newGameButton.addEventListener("click", resetGame);
      aiMoveButton.addEventListener("click", runAiMove);
      languageToggleButton.addEventListener("click", () => {
        const nextLanguage = currentLanguage === "ja" ? "en" : "ja";
        writeLanguagePreference(nextLanguage);
        applyLanguage(nextLanguage);
      });

      boardCsvInput.addEventListener("input", () => {
        updateBoardInfo();
        syncGameFromTextarea();
      });
      boardCsvInput.value = createEmptyBoardCsv();
      resetGame();
      applyLanguage(currentLanguage);

      function queueAiOpeningMove() {
        window.setTimeout(() => {
          if (!gameState.busy && !gameState.over && currentPlayer() === AI_PLAYER) {
            runAiMove();
          }
        }, 0);
      }
    </script>
  </body>
</html>
