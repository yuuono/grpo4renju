# config/config_versus.yaml
defaults:
  - data: default
  - model: transformer
  - train: default
  - _self_

mode: versus
seed: 42

versus:
  model_a_path: models/step_000100_grpo_model.pt
  model_b_path: models/step_000700_grpo_model.pt # This must be overridden via command line or modified by user
  num_games: 20       # Should be an even number so both models play black and white equally
  temperature: 1.0    # 0.0 for argmax (deterministic), >0.0 for sampling
  device: auto
